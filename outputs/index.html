let capChart;
function buildCapitalChart(monthly) {
  const el = document.getElementById("capChart");
  if (!el || !monthly || !monthly.length) return;
  const labels = monthly.map(m => m.month);
  const mk = (label, key, color) => ({
    label, data: monthly.map(m => Math.round((m[key] || 0) / 1000)),
    borderColor: color, backgroundColor: color, borderWidth: 1.5, pointRadius: 0, tension: .2
  });
  capChart = new Chart(el, {
    type: "line",
    data: { labels, datasets: [mk("All", "total", "#2563eb"), mk("Small cap", "small", "#059669"), mk("Large cap", "large", "#94a3b8")] },
    options: {
      maintainAspectRatio: false, animation: false, interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "top", align: "end", labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: { callbacks: { label: c => c.dataset.label + ": £" + (c.parsed.y).toLocaleString("en-GB") + "k" } }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 10, font: { size: 10 }, color: "#94a3b8" }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: "#94a3b8", callback: v => "£" + v + "k" }, grid: { color: "#f1f5f9" } }
      }
    }
  });
}

// ---- Inline sparkline (SVG) -----------------------------------------------
function sparkline(values, color) {
  if (!values || values.length < 2) return "";
  const w = 80, h = 28, pad = 2;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" class="inline-block align-middle opacity-70"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// Build weekly counts from rows over last 13 weeks
function weeklyCountSeries(rows, field, since90) {
  // bucket by ISO week
  const buckets = {};
  for (const r of rows) {
    const d = day(r.date);
    if (d < since90) continue;
    const dt = new Date(d + "T00:00:00Z");
    const yr = dt.getUTCFullYear(), wk = isoWeek(dt);
    const key = `${yr}-${String(wk).padStart(2,"0")}`;
    buckets[key] = (buckets[key] || 0) + 1;
  }
  const keys = Object.keys(buckets).sort();
  return keys.map(k => buckets[k]);
}
function isoWeek(d) {
  const tmp = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const day1 = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - day1);
  const y0 = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return Math.ceil((((tmp - y0) / 86400000) + 1) / 7);
}

// ---- Conviction score -------------------------------------------------------
const CONV_W = { who: 0.25, buy_size: 0.25, company_size: 0.20, past_performance: 0.15 };
const ROLE_STRENGTH = {
  "CEO": 1.0, "Founder": 1.0, "Chair (executive)": 1.0, "Non-Exec Chair": 1.0, "CFO": 0.9,
  "Other Chief": 0.7, "Executive Director": 0.7, "Divisional / Regional Exec": 0.7, "President / VP": 0.7,
  "Company Secretary / General Counsel": 0.5, "NED": 0.3, "PCA": 0.3,
  "PDMR-only": 0.2, "Other / unclassified": 0.2, "Parser fragment": 0.2
};
const clamp01 = x => (x < 0 ? 0 : (x > 1 ? 1 : x));
function logRamp(v, floor, ceil) {
  if (v <= floor) return 0; if (v >= ceil) return 1;
  const lo = Math.log10(floor), hi = Math.log10(ceil);
  return clamp01((Math.log10(v) - lo) / (hi - lo));
}
function f3CompanySize(cap) {
  if (!cap || cap <= 0) return 0.5;
  if (cap <= 50e6) return 1.0; if (cap >= 10e9) return 0.1;
  const lo = Math.log10(50e6), hi = Math.log10(10e9);
  return clamp01(1.0 - ((Math.log10(cap) - lo) / (hi - lo)) * 0.9);
}
function bandFor(s) { return s < 40 ? "Low" : s < 60 ? "Moderate" : s < 80 ? "High" : "Exceptional"; }
function convictionScore(r) {
  const sub = {
    who: ROLE_STRENGTH[r.role_normalized] ?? 0.2,
    buy_size: logRamp(Number(r.value) || 0, 5000, 5000000),
    company_size: f3CompanySize(r.market_cap_gbp),
    past_performance: 0.5
  };
  const total = Object.values(CONV_W).reduce((a, b) => a + b, 0);
  let s = 0; for (const k in CONV_W) s += (CONV_W[k] / total) * clamp01(sub[k]);
  const score = clamp01(s) * 100;
  return { score, band: bandFor(score), sub };
}
const CONV_BAND_CLS = { Low: "bg-slate-100 text-slate-500", Moderate: "bg-amber-100 text-amber-700", High: "bg-emerald-100 text-emerald-700", Exceptional: "bg-emerald-600 text-white" };
function bandBadge(band, score) {
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold ${CONV_BAND_CLS[band] || "bg-slate-100 text-slate-500"}">${band} · ${Math.round(score)}</span>`;
}
function factorChip(short, value, unknown) {
  if (unknown || value == null) {
    return `<span class="inline-flex flex-col items-center px-1 py-0.5 rounded bg-slate-50 text-[9px] leading-tight" title="${short}: needs pipeline"><span class="text-slate-400">${short}</span><span class="text-slate-400 italic">n/a</span></span>`;
  }
  return `<span class="inline-flex flex-col items-center px-1 py-0.5 rounded bg-indigo-50 text-[9px] leading-tight"><span class="text-slate-500">${short}</span><span class="text-indigo-700 font-semibold tabular-nums">${Math.round(value * 100)}%</span></span>`;
}

function convictionPanel(rows, since) {
  const scored = rows

    const r = d.r;
    const factors = `<div class="flex flex-wrap gap-1">${factorChip("Who", d.sub.who)}${factorChip("Size", d.sub.buy_size)}${factorChip("Cap", d.sub.company_size)}${factorChip("Earn", null, true)}${factorChip("Past", null, true)}</div>`;
    return `<tr class="border-t border-slate-100 hover:bg-indigo-50">
      <td class="px-3 py-2 text-center"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-indigo-600 text-white text-[10px] font-bold">${i + 1}</span></td>
      <td class="px-3 py-2">${bandBadge(d.band, d.score)}</td>
      <td class="px-3 py-2"><a href="${companyUrl(r.ticker)}" class="text-blue-600 hover:underline font-medium">${esc(r.ticker)}</a><div class="text-[10px] text-slate-500 truncate max-w-[12rem]">${esc(r.company || "")}</div></td>
      <td class="px-3 py-2 text-slate-700">${esc(r.director || "")}<div class="text-[10px] text-slate-400 mt-0.5">${roleChip(r.role, r.role_normalized)}</div></td>

      <td class="px-3 py-2 text-right tabular-nums text-slate-600">${fmtGbp(r.value)}</td>
      <td class="px-3 py-2">${factors}</td>
    </tr>`;
  }).join("");
  return `<section class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
    <div class="px-4 py-3 border-b border-slate-200 flex items-baseline justify-between gap-2 flex-wrap">
      <h2 class="text-xs uppercase tracking-wide text-slate-500">Conviction — top picks (last 4 weeks)</h2>
      <span class="text-[10px] text-slate-400">score 0–100 · Who / Size / Cap live · Earn &amp; Past need pipeline</span>
    </div>
    <div class="overflow-x-auto"><table class="w-full text-sm min-w-[720px]">
      <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
        <th class="px-3 py-2 font-medium text-center">#</th><th class="px-3 py-2 font-medium">Score</th><th class="px-3 py-2 font-medium">Company</th>
        <th class="px-3 py-2 font-medium">Director</th><th class="px-3 py-2 font-medium">Reported</th><th class="px-3 py-2 font-medium text-right">Value</th><th class="px-3 py-2 font-medium">Factors</th>
      </tr></thead><tbody>${body}</tbody></table></div></section>`;
}

// ---- Conviction dismissals (localStorage, persists across reloads) ----------
const CONV_DISMISS_KEY = "dd_conv_dismissed_v1";
function convDismissed() { try { return JSON.parse(localStorage.getItem(CONV_DISMISS_KEY) || "[]"); } catch { return []; } }
function convDismiss(k) { const d = new Set(convDismissed()); d.add(k); localStorage.setItem(CONV_DISMISS_KEY, JSON.stringify([...d])); }
function convReset() { localStorage.removeItem(CONV_DISMISS_KEY); document.querySelectorAll("tr[data-conv-key]").forEach(r => r.style.display = ""); document.getElementById("convResetBtn")?.classList.add("hidden"); }

function realConvictionPanel(convRows) {
  if (!convRows || !convRows.length) return "";
  const maxW = convRows.map(r => r.window_end).filter(Boolean).sort().slice(-1)[0];
  const cutoff28 = addDays(new Date().toISOString().slice(0, 10), -28);
  const items = convRows.filter(r => r.window_end === maxW && day(r.date) >= cutoff28)
    .sort((a, b) => (b.score || 0) - (a.score || 0))
    .slice(0, 10);
  if (!items.length) return "";
  const dismissed = new Set(convDismissed());
  const hasDismissed = dismissed.size > 0;
  const body = items.map((d, i) => {
    const key = `${d.ticker}|${d.director}|${day(d.date)}`;
    const hidden = dismissed.has(key) ? ' style="display:none"' : "";
    const hot = (d.f6_sector_mult != null && d.f6_sector_mult < 1)
      ? ` <span class="inline-flex items-center text-[9px] px-1 py-0.5 rounded bg-amber-100 text-amber-800 font-semibold align-middle" title="Sector running hot — score discounted">⚠ hot</span>` : "";
    const factors = `<div class="flex flex-wrap gap-1">${factorChip("Who", d.f1_who)}${factorChip("Size", d.f2_buy_size)}${factorChip("Cap", d.f3_company_size)}${factorChip("Earn", d.f4_earnings_timing, !!d.earnings_dropped)}${factorChip("Past", d.f5_past_performance)}</div>`;
    return `<tr data-conv-key="${esc(key)}" class="border-t border-slate-100 hover:bg-indigo-50"${hidden}>
      <td class="px-3 py-2 text-center"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-indigo-600 text-white text-[10px] font-bold">${i + 1}</span></td>
      <td class="px-3 py-2">${bandBadge(d.band || "Low", d.score || 0)}${hot}</td>
      <td class="px-3 py-2"><a href="${companyUrl(d.ticker)}" class="text-blue-600 hover:underline font-medium">${esc(d.ticker)}</a><div class="text-[10px] text-slate-500 truncate max-w-[12rem]">${esc(d.company || "")}</div></td>
      <td class="px-3 py-2 text-slate-700">${esc(d.director || "")}<div class="text-[10px] text-slate-400 mt-0.5">${roleChip(null, d.role_normalized)}</div></td>
      <td class="px-3 py-2 text-slate-500 text-[11px] tabular-nums">${esc(day(d.date))}</td>
      <td class="px-3 py-2 text-right tabular-nums text-slate-600">${fmtGbp(d.value)}</td>
      <td class="px-3 py-2">${factors}</td>
      <td class="px-2 py-2 text-center"><button onclick="convDismiss('${esc(key)}');this.closest('tr').style.display='none';document.getElementById('convResetBtn')?.classList.remove('hidden')" title="Hide this entry" class="w-5 h-5 rounded text-slate-300 hover:text-rose-500 hover:bg-rose-50 text-xs leading-none">×</button></td>
    </tr>`;
  }).join("");
  return `<section class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
    <div class="px-4 py-3 border-b border-slate-200 flex items-center justify-between gap-2 flex-wrap">
      <h2 class="text-xs uppercase tracking-wide text-slate-500">Conviction — top picks (rolling window)</h2>
      <div class="flex items-center gap-3">
        <span class="text-[10px] text-slate-400">live graded score 0–100 · all 6 factors · scored up to ${esc(maxW || "")}</span>
        <button id="convResetBtn" onclick="convReset()" class="text-[10px] text-indigo-500 hover:text-indigo-700 underline${hasDismissed ? "" : " hidden"}">Show all</button>
      </div>
    </div>
    <div class="overflow-x-auto"><table class="w-full text-sm min-w-[760px]">
      <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
        <th class="px-3 py-2 font-medium text-center">#</th><th class="px-3 py-2 font-medium">Score</th><th class="px-3 py-2 font-medium">Company</th>
        <th class="px-3 py-2 font-medium">Director</th><th class="px-3 py-2 font-medium">Reported</th><th class="px-3 py-2 font-medium text-right">Value</th><th class="px-3 py-2 font-medium">Factors</th><th class="px-2 py-2"></th>
      </tr></thead><tbody>${body}</tbody></table></div></section>`;
}


// ---- Summary tiles with sparklines ----------------------------------------
function tile(label, value, sub, spark) {
  return `<div class="bg-white border border-slate-200 rounded-lg px-4 py-3">
    <div class="text-[11px] uppercase tracking-wide text-slate-500">${label}</div>
    <div class="flex items-end justify-between gap-2 mt-0.5">
      <div>
        <div class="text-2xl font-semibold text-slate-900">${value}</div>
        ${sub ? `<div class="text-[11px] text-slate-400 mt-0.5">${sub}</div>` : ""}
      </div>
      ${spark || ""}
    </div>
  </div>`;
}

function clustersFrom(rows, since) {
  const byTicker = {};
  for (const r of rows) {
    if ((r.type || "").toUpperCase() !== "BUY") continue;
    if (day(r.date) < since) continue;
    const t = r.ticker; if (!t) continue;
    (byTicker[t] = byTicker[t] || { ticker: t, company: r.company, dirs: new Set(), value: 0, first: day(r.date), last: day(r.date) });
    const c = byTicker[t];
    c.dirs.add((r.director || "").trim().toLowerCase());
    c.value += Number(r.value) || 0;
    const d = day(r.date); if (d < c.first) c.first = d; if (d > c.last) c.last = d;
    if (r.company && !c.company) c.company = r.company;
  }
  return Object.values(byTicker).filter(c => c.dirs.size >= 2).sort((a, b) => b.dirs.size - a.dirs.size || b.value - a.value);
}

function clusterCard(c) {
  return `<a href="${companyUrl(c.ticker)}" class="block bg-white border border-slate-200 rounded-lg p-3 hover:border-slate-300">
    <div class="flex items-center justify-between gap-2">
      <div class="font-semibold text-slate-900 truncate">${esc(c.company || c.ticker)} <span class="text-slate-400 text-xs">${esc(c.ticker)}</span></div>
      <span class="shrink-0 text-[11px] px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 border border-emerald-200">${c.dirs.size} buyers</span>
    </div>
    <div class="text-xs text-slate-500 mt-1">${fmtGbp(c.value)} · ${esc(c.first)} → ${esc(c.last)}</div></a>`;
}

function dealingsTable(rows) {
  const body = rows.map(r => {
    const type = (r.type || "").toUpperCase();
    const tkey = type || "OTHER";
    const tcls = type === "BUY" ? "bg-emerald-100 text-emerald-700" : (type === "SELL" || type === "SELL_TAX") ? "bg-rose-100 text-rose-700" : "bg-slate-100 text-slate-500";
    const url = r.url || "";
    const fp = esc(r.fingerprint || "");
    const src = url ? `<a href="${esc(url)}" target="_blank" rel="noopener" class="text-slate-400 hover:text-indigo-600" title="RNS announcement">↗</a>` : `<span class="text-slate-200">↗</span>`;
    const rev = (fp && isLocalhost) ? `<a href="review.html?tab=b&fp=${fp}" class="text-slate-300 hover:text-indigo-500 ml-1" title="Open in PDMR review">✎</a>` : "";
    return `<tr data-type="${esc(tkey)}" data-search="${esc((r.ticker||"")+" "+(r.company||"")).toLowerCase()}" class="border-b border-slate-100 hover:bg-slate-50">
      <td class="px-3 py-2 text-slate-600">${esc(day(r.date))}</td>
      <td class="px-3 py-2"><a class="text-indigo-600 hover:underline font-medium" href="${companyUrl(r.ticker)}">${esc(r.ticker)}</a></td>
      <td class="px-3 py-2 text-slate-700 max-w-[180px] truncate">${esc(r.company || "")}</td>
      <td class="px-3 py-2 text-slate-700">${esc(r.director || "-")}</td>
      <td class="px-3 py-2">${roleChip(r.role, r.role_normalized)}</td>
      <td class="px-3 py-2"><span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${tcls}">${esc(type || "-")}</span></td>
      <td class="px-3 py-2 text-right tabular-nums">${fmtGbp(r.value)}</td>
      <td class="px-3 py-2">${sigBadges(r.signals)}</td>
      <td class="px-3 py-2 text-center">${src}${rev}</td>
    </tr>`;
  }).join("");
  const types = [...new Set(rows.map(r => ((r.type || "").toUpperCase()) || "OTHER"))];
  const TYPE_CLS = { BUY: "bg-emerald-600 border-emerald-600", SELL: "bg-rose-600 border-rose-600", SELL_TAX: "bg-rose-600 border-rose-600" };
  const orderT = ["BUY", "SELL", "SELL_TAX"];
  const sortedTypes = [...orderT.filter(t => types.includes(t)), ...types.filter(t => !orderT.includes(t)).sort()];
  // Default: BUY=on, everything else=off
  const chips = sortedTypes.map(t => {
    const on = (t === "BUY");
    return `<button type="button" data-tf="${esc(t)}" aria-pressed="${on}" class="tf-btn px-2 py-0.5 rounded text-[11px] font-semibold text-white border ${TYPE_CLS[t] || "bg-slate-600 border-slate-600"}">${esc(t)}</button>`;
  }).join("");
  return `
    <section class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
      <div class="flex items-center justify-between gap-2 flex-wrap px-4 py-3 border-b border-slate-200">
        <h2 class="text-xs uppercase tracking-wide text-slate-500">This week's dealings</h2>
        <div class="flex flex-wrap gap-1.5 items-center">
          <span class="text-[10px] text-slate-400 mr-1">Filter:</span>${chips}
          ${isLocalhost ? '<a href="review.html" class="ml-2 text-[11px] text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded px-2 py-0.5">Review ✎</a>' : ''}
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[820px]" id="dealingsTable">
          <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
            <th class="px-3 py-2 font-medium">Date</th><th class="px-3 py-2 font-medium">Ticker</th><th class="px-3 py-2 font-medium">Company</th>
            <th class="px-3 py-2 font-medium">Director</th><th class="px-3 py-2 font-medium">Role</th><th class="px-3 py-2 font-medium">Type</th>
            <th class="px-3 py-2 font-medium text-right">Value</th><th class="px-3 py-2 font-medium">Signals</th><th class="px-3 py-2 font-medium text-center">Links</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </section>`;
}

function wireTypeFilters() {
  document.querySelectorAll(".tf-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.tf;
      const next = btn.getAttribute("aria-pressed") !== "true";
      btn.setAttribute("aria-pressed", String(next));
      applyFilters();
    });
  });
  // Apply initial filter state
  applyFilters();
}

function applyFilters() {
  const activeTypes = new Set();
  document.querySelectorAll(".tf-btn[aria-pressed='true']").forEach(b => activeTypes.add(b.dataset.tf));
  const q = (document.getElementById("globalSearch")?.value || "").toLowerCase().trim();
  document.querySelectorAll("#dealingsTable tbody tr").forEach(row => {
    const searchMatch = !q || (row.dataset.search || "").includes(q);
    // When a search query is active, bypass the type filter so all matching rows show
    const typeMatch = q ? true : activeTypes.has(row.dataset.type);
    row.style.display = (typeMatch && searchMatch) ? "" : "none";
  });
}

// ---- DB stats section -------------------------------------------------------
async function loadDbStats(rows) {
  const el = document.getElementById("dbStats");
  const inner = document.getElementById("dbStatsInner");
  if (!el || !inner) return;

  // Fetch real totals from Supabase view (accurate, not limited by page fetch)
  let stats = null;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/public_stats_v?select=*&limit=1`,
      { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } });
    const d = r.ok ? await r.json() : [];
    stats = d[0] || null;
  } catch (e) { /* fall through */ }

  // Sector breakdown from full DB (tickers_meta for companies, all transactions for directors)
  const sectorMap = {};
  try {
    const [tmRes, txRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/tickers_meta?select=sector,ticker&sector=not.is.null&sector=not.eq.&limit=2000`,
        { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } }),
      fetch(`${SUPABASE_URL}/rest/v1/public_company_v?select=sector,director,type&limit=9999`,
        { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } })
    ]);
    const tmRows = tmRes.ok ? await tmRes.json() : [];
    const txRows = txRes.ok ? await txRes.json() : [];
    tmRows.forEach(r => {
      if (!r.sector) return;
      sectorMap[r.sector] = sectorMap[r.sector] || { companies: new Set(), dirs: new Set(), buys: 0, sells: 0 };
      if (r.ticker) sectorMap[r.sector].companies.add(r.ticker);
    });
    txRows.forEach(r => {
      if (!r.sector) return;
      sectorMap[r.sector] = sectorMap[r.sector] || { companies: new Set(), dirs: new Set(), buys: 0, sells: 0 };
      if (r.director) sectorMap[r.sector].dirs.add(r.director.trim().toLowerCase());
      if (r.type === "BUY")  sectorMap[r.sector].buys++;
      if (r.type === "SELL") sectorMap[r.sector].sells++;
    });
  } catch(e) {
    // fallback to in-memory rows
    rows.forEach(r => {
      const s = r.sector || "No sector";
      sectorMap[s] = sectorMap[s] || { companies: new Set(), dirs: new Set(), buys: 0, sells: 0 };
      if (r.ticker) sectorMap[s].companies.add(r.ticker);
      if (r.director) sectorMap[s].dirs.add(r.director.trim().toLowerCase());
      if (r.type === "BUY")  sectorMap[s].buys++;
      if (r.type === "SELL") sectorMap[s].sells++;
    });
  }

  const statTile = (label, value, note) =>
    `<div class="bg-white border border-slate-200 rounded-lg px-3 py-2.5">
      <div class="text-[10px] uppercase tracking-wide text-slate-400">${label}</div>
      <div class="text-xl font-semibold text-slate-800 mt-0.5">${value}</div>
      ${note ? `<div class="text-[10px] text-slate-400 mt-0.5">${note}</div>` : ""}
    </div>`;

  const totalFilings   = stats ? fmtInt(stats.total_filings)   : fmtInt(rows.length) + "*";
  const totalCompanies = stats ? fmtInt(stats.total_companies)  : "—";
  const totalDirs      = stats ? fmtInt(stats.total_directors)  : "—";
  const totalBuys      = stats ? fmtInt(stats.total_buys)       : "—";
  const totalSignals   = stats ? fmtInt(stats.total_signals)    : "—";
  const noSector       = stats ? fmtInt(stats.missing_sector)   : "—";
  const noCap          = stats ? fmtInt(stats.missing_cap)      : "—";

  inner.innerHTML = statTile("Total RNS filings", totalFilings, "all time")
    + statTile("Companies", totalCompanies, "distinct tickers")
    + statTile("Directors", totalDirs, "unique names")
    + statTile("BUY transactions", totalBuys, "of all filings")
    + statTile("Signals fired", totalSignals, "across all tickers")
    + statTile("No sector data", noSector, "companies missing")
    + statTile("No mkt cap data", noCap, "companies missing");

  // Sector breakdown table
  const sectors = Object.entries(sectorMap)
    .filter(([k]) => k !== "No sector")
    .sort((a, b) => b[1].companies.size - a[1].companies.size);
  if (sectors.length) {
    const sectorRows = sectors.map(([s, d]) =>
      `<tr class="border-t border-slate-100"><td class="py-1 px-2 text-xs text-slate-700">${esc(s)}</td><td class="py-1 px-2 text-xs text-right tabular-nums">${d.companies.size}</td><td class="py-1 px-2 text-xs text-right tabular-nums">${d.dirs.size}</td><td class="py-1 px-2 text-xs text-right tabular-nums text-emerald-700">${d.buys}</td><td class="py-1 px-2 text-xs text-right tabular-nums text-red-600">${d.sells}</td></tr>`
    ).join("");
    inner.insertAdjacentHTML("afterend", `
      <div class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
        <div class="px-4 py-3 border-b border-slate-100"><h3 class="text-xs uppercase tracking-wide text-slate-400">Companies &amp; directors by sector</h3></div>
        <div class="overflow-x-auto"><table class="w-full">
          <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-100">
            <th class="py-1 px-2 font-medium">Sector</th><th class="py-1 px-2 font-medium text-right">Companies</th><th class="py-1 px-2 font-medium text-right">Directors</th><th class="py-1 px-2 font-medium text-right text-emerald-700">Buys</th><th class="py-1 px-2 font-medium text-right text-red-600">Sells</th>
          </tr></thead><tbody>${sectorRows}</tbody>
        </table></div>
      </div>`);
  }

  el.classList.remove("hidden");
}

function render(rows, monthly, convRows) {
  if (!rows || !rows.length) { app.innerHTML = `<div class="py-20 text-center text-slate-400 text-sm">No dealings found.</div>`; return; }
  const maxDate = rows.map(r => day(r.date)).filter(Boolean).sort().slice(-1)[0];
  const win7  = addDays(maxDate, -7);
  const win14 = addDays(maxDate, -14);
  const win28 = addDays(maxDate, -28);
  const win30 = addDays(maxDate, -30);
  const win90 = addDays(maxDate, -90);
  const week     = rows.filter(r => day(r.date) >= win7);
  const prevWeek = rows.filter(r => day(r.date) >= win14 && day(r.date) < win7);
  const q90   = rows.filter(r => day(r.date) >= win90);
  const clusters     = clustersFrom(rows, win30);
  const clustersPrev = clustersFrom(rows.filter(r => day(r.date) < win7), addDays(win7, -30));

  // Sparkline data (weekly buckets over 90 days)
  const dealSeries    = weeklyCountSeries(rows.filter(r => day(r.date) >= win90), "date", win90);
  const clusterSeries = weeklyCountSeries(rows.filter(r => {
    if ((r.type||"").toUpperCase() !== "BUY") return false;
    if (day(r.date) < win90) return false;
    return true;
  }), "date", win90);
  const compWeekly = (() => {
    const bkt = {};
    for (const r of q90) {
      const dt = new Date((r.date||"").slice(0,10)+"T00:00:00Z");
      const yr = dt.getUTCFullYear(), wk = isoWeek(dt);
      const key = `${yr}-${String(wk).padStart(2,"0")}`;
      (bkt[key] = bkt[key] || new Set()).add(r.ticker);
    }
    return Object.keys(bkt).sort().map(k => bkt[k].size);
  })();

  // Week-on-week comparisons
  const compNow  = new Set(week.map(r => r.ticker)).size;
  const compPrev = new Set(prevWeek.map(r => r.ticker)).size;
  function wkChg(now, prev) {
    if (!prev) return "";
    const d = now - prev;
    if (!d) return "";
    return d > 0
      ? ` · <span class="text-emerald-600">▲${d}</span> vs prev week`
      : ` · <span class="text-rose-600">▼${Math.abs(d)}</span> vs prev week`;
  }

  const sparkDeal    = sparkline(dealSeries, "#2563eb");
  const sparkCluster = sparkline(clusterSeries, "#059669");
  const sparkComp    = sparkline(compWeekly, "#7c3aed");

  const tiles = `<div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-5">
    ${tile("Dealings this week", fmtInt(week.length), "to " + esc(maxDate) + wkChg(week.length, prevWeek.length), sparkDeal)}
    ${tile("Active clusters", fmtInt(clusters.length), "≥2 buyers · 30 days" + wkChg(clusters.length, clustersPrev.length), sparkCluster)}
    ${tile("Companies", fmtInt(compNow), "this week" + wkChg(compNow, compPrev), sparkComp)}
  </div>`;

  const clusterHtml = clusters.length
    ? `<section class="mt-4"><h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Active clusters</h2>
       <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${clusters.slice(0, 12).map(clusterCard).join("")}</div></section>`
    : "";

  const capHtml = `<section class="mt-4 bg-white border border-slate-200 rounded-lg p-4">
    <h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Capital deployed — director buys (£k / month)</h2>
    <div class="relative" style="height:220px"><canvas id="capChart"></canvas></div></section>`;

  const topHtml = (convRows && convRows.length) ? realConvictionPanel(convRows) : convictionPanel(rows, win28);
  app.innerHTML = tiles + topHtml + clusterHtml + capHtml + dealingsTable(week);
  wireTypeFilters();
  buildCapitalChart(monthly);

  // Search wiring
  const srch = document.getElementById("globalSearch");
  if (srch) srch.addEventListener("input", applyFilters);

  // Load DB stats async
  loadDbStats(rows);
}

(async function () {
  try {
    const [rows, monthly, convRows] = await Promise.all([fetchAll(), fetchCapital(), fetchConviction()]);
    render(rows, monthly, convRows);
  } catch (e) { app.innerHTML = `<div class="py-20 text-center text-rose-600 text-sm">Couldn't load data (${esc(e.message)}).</div>`; }
})();

// B-197: Refresh button → Supabase edge function
(function () {
  const btn = document.getElementById("refreshBtn");
  if (!btn) return;
  const label = btn.innerHTML;
  btn.addEventListener("click", async function () {
    btn.disabled = true;
    btn.innerHTML = '<span class="spin inline-block">&#8635;</span> Refreshing…';
    try {
      const r = await fetch(SUPABASE_URL + "/functions/v1/trigger-refresh", {
        method: "POST",
        headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" },
      });
      const d = await r.json().catch(function () { return {}; });
      if (d && d.ok) {
        btn.innerHTML = (d.status === "triggered") ? "&#10003; Started" : "&#10003; OK";
        alert(d.message || "Refresh requested. New data in a few minutes — reload the page to see it.");
      } else {
        btn.innerHTML = "&#10007; Failed";
        alert((d && d.error) ? d.error : "Could not start a refresh. Please try again shortly.");
      }
    } catch (e) {
      btn.innerHTML = "&#10007; Failed";
      alert("Could not reach the refresh service (" + e.message + ").");
    } finally {
      setTimeout(function () { btn.disabled = false; btn.innerHTML = label; }, 8000);
    }
  });
})();
</script>
