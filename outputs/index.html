<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Directors Dealings — This Week</title>
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<style>
  html, body { background:#f8fafc; color:#0f172a; }
  .tf-btn[aria-pressed="false"] { opacity:.35; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

<header class="border-b border-slate-200 bg-white px-4 sm:px-6 h-12 flex items-center justify-between gap-2">
  <h1 class="text-sm font-semibold text-slate-900 tracking-tight truncate">Directors Dealings — This Week</h1>
  <nav class="flex items-center gap-3 text-xs text-slate-500">
    <a class="hover:text-slate-900" href="./performance.html">Performance</a>
    <a class="hover:text-slate-900" href="./baskets.html">Baskets</a>
    <span class="inline-flex items-center gap-1 text-emerald-600"><span class="w-2 h-2 rounded-full bg-emerald-500"></span>Live</span>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 pb-20">
  <div id="app"><div class="py-20 text-center text-slate-400 text-sm">Loading latest dealings…</div></div>
  <footer class="mt-10 pt-4 border-t border-slate-200 text-[11px] text-slate-400">
    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 align-middle mr-1"></span>
    Live from the Directors Dealings database. UK RNS PDMR announcements. Signal badges are colour-coded by conviction tier — hover for definitions.
  </footer>
</main>

<script>
// Public, read-only credentials (RLS restricts the anon key to the serving views).
const SUPABASE_URL = "https://mmiaiauybzsdcbrrcxfc.supabase.co";
const SUPABASE_KEY = "sb_publishable_vADFSIyRre-9sGyhDnXBcA_H167SU8B";

const app = document.getElementById("app");
const fmtInt = n => (n == null ? "" : Number(n).toLocaleString("en-GB"));
const fmtGbp = n => (n == null || n === "" ? "-" : "£" + Number(n).toLocaleString("en-GB", { maximumFractionDigits: 0 }));
const esc = s => (s == null ? "" : String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c])));
const day = s => (s ? String(s).slice(0, 10) : "");
const companyUrl = t => "company.html?ticker=" + encodeURIComponent(t || "");
function addDays(iso, n) { const d = new Date(iso + "T00:00:00Z"); d.setUTCDate(d.getUTCDate() + n); return d.toISOString().slice(0, 10); }

// ---- Signal tier palette (mirror of render_helpers.TIER_PALETTE) -----------
const TIER = {
  t0:"bg-red-600 text-white", t1a:"bg-red-500 text-white", t1b:"bg-rose-500 text-white",
  t7:"bg-violet-500 text-white", t2:"bg-amber-500 text-white", t3:"bg-emerald-500 text-white",
  t5:"bg-orange-400 text-white", t6:"bg-slate-300 text-white", t4:"bg-slate-400 text-white",
  s1:"bg-blue-500 text-white", f1:"bg-purple-500 text-white", b1:"bg-cyan-500 text-white", b2:"bg-red-600 text-white"
};
const SIG_L2S = {
  t0_cluster_combo:"t0", t1a_ceo_founder_buy:"t1a", t1b_cfo_buy:"t1b", t7_chair_buy:"t7",
  t2_exec_buy:"t2", t3_ned_buy:"t3", t5_pca_buy:"t5", t6_company_sec_buy:"t6", t4_other_buy:"t4",
  s1_cluster_buy:"s1", f1_first_time_buy:"f1", b1_lone_conviction_buy:"b1", b2_crowded_cluster_kill:"b2"
};
const SIG_SEV = { t0:0,t1a:1,t1b:2,t7:3,t2:4,t3:5,t5:6,t6:7,t4:8,s1:9,f1:10,b1:11,b2:12 };
const SIG_TIP = {
  t0:"T0 — Cluster + opportunistic combo. Highest conviction.",
  t1a:"T1a — CEO / Founder buy ≥ £100k.", t1b:"T1b — CFO buy ≥ £100k.",
  t7:"T7 — Chair buy ≥ £25k.", t2:"T2 — Other senior exec buy ≥ £25k.",
  t3:"T3 — NED buy ≥ £10k.", t5:"T5 — PCA buy ≥ £10k.", t6:"T6 — Co Sec / GC buy ≥ £10k.",
  t4:"T4 — Other discretionary buy ≥ £1k.", s1:"S1 — Cluster (≥2 directors, 30d).",
  f1:"F1 — First-time buy of this ticker.", b1:"B1 — Lone conviction buy ≥ £200k.",
  b2:"B2 — Crowded cluster kill (≥4 directors)."
};
function sigBadges(sigs) {
  if (!sigs || !sigs.length) return '<span class="text-slate-300">-</span>';
  const short = sigs.map(s => SIG_L2S[s] || s).filter(Boolean).sort((a, b) => (SIG_SEV[a] ?? 99) - (SIG_SEV[b] ?? 99));
  return '<span class="inline-flex flex-wrap gap-1">' + short.map(s => {
    const cls = TIER[s] || "bg-slate-300 text-white";
    return `<span title="${esc(SIG_TIP[s] || s)}" class="cursor-help inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold ${cls}">${esc(s.toUpperCase())}</span>`;
  }).join("") + '</span>';
}

// ---- Role chips ------------------------------------------------------------
const ROLE_CLS = {
  "CEO":"bg-indigo-100 text-indigo-700", "CFO":"bg-indigo-100 text-indigo-700", "Other Chief":"bg-indigo-50 text-indigo-600",
  "Founder":"bg-emerald-100 text-emerald-700", "Chair (executive)":"bg-violet-100 text-violet-700", "Non-Exec Chair":"bg-violet-50 text-violet-600",
  "NED":"bg-slate-100 text-slate-600", "Executive Director":"bg-sky-100 text-sky-700", "Divisional / Regional Exec":"bg-sky-50 text-sky-600",
  "President / VP":"bg-sky-50 text-sky-600", "Company Secretary / General Counsel":"bg-slate-50 text-slate-500", "PCA":"bg-amber-50 text-amber-700",
  "PDMR-only":"bg-slate-50 text-slate-500", "Other / unclassified":"bg-slate-50 text-slate-400", "Parser fragment":"bg-rose-50 text-rose-500"
};
const ROLE_LABEL = {
  "CEO":"CEO", "CFO":"CFO", "Other Chief":"C-suite", "Founder":"Founder", "Chair (executive)":"Chair", "Non-Exec Chair":"NE Chair",
  "NED":"NED", "Executive Director":"Exec Dir", "Divisional / Regional Exec":"Div Exec", "President / VP":"VP",
  "Company Secretary / General Counsel":"Co Sec", "PCA":"PCA", "PDMR-only":"PDMR", "Other / unclassified":"Other", "Parser fragment":"?"
};
function roleChip(role, rn) {
  if (!role && !rn) return '<span class="text-slate-300">-</span>';
  if (!rn) return `<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">${esc(role)}</span>`;
  const cls = ROLE_CLS[rn] || "bg-slate-100 text-slate-600";
  return `<span class="text-[10px] px-1.5 py-0.5 rounded ${cls}" title="${esc(role || rn)}">${esc(ROLE_LABEL[rn] || rn)}</span>`;
}

async function fetchAll() {
  const url = `${SUPABASE_URL}/rest/v1/public_company_v?order=date.desc,announced_at.desc&limit=600`;
  const res = await fetch(url, { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function tile(label, value, sub) {
  return `<div class="bg-white border border-slate-200 rounded-lg px-4 py-3">
    <div class="text-[11px] uppercase tracking-wide text-slate-500">${label}</div>
    <div class="text-2xl font-semibold text-slate-900 mt-0.5">${value}</div>
    ${sub ? `<div class="text-[11px] text-slate-400 mt-0.5">${sub}</div>` : ""}</div>`;
}

function clustersFrom(rows, since) {
  // Active cluster = >=2 distinct directors BUYING the same ticker within the window.
  const byTicker = {};
  for (const r of rows) {
    if ((r.type || "").toUpperCase() !== "BUY") continue;
    if (day(r.date) < since) continue;
    const t = r.ticker; if (!t) continue;
    (byTicker[t] = byTicker[t] || { ticker: t, company: r.company, dirs: new Set(), value: 0, first: day(r.date), last: day(r.date) });
    const c = byTicker[t];
    c.dirs.add((r.director || "").trim().toLowerCase());
    c.value += Number(r.value) || 0;
    const d = day(r.date); if (d < c.first) c.first = d; if (d > c.last) c.last = d;
    if (r.company && !c.company) c.company = r.company;
  }
  return Object.values(byTicker).filter(c => c.dirs.size >= 2).sort((a, b) => b.dirs.size - a.dirs.size || b.value - a.value);
}

function clusterCard(c) {
  return `<a href="${companyUrl(c.ticker)}" class="block bg-white border border-slate-200 rounded-lg p-3 hover:border-slate-300">
    <div class="flex items-center justify-between gap-2">
      <div class="font-semibold text-slate-900 truncate">${esc(c.company || c.ticker)} <span class="text-slate-400 text-xs">${esc(c.ticker)}</span></div>
      <span class="shrink-0 text-[11px] px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 border border-emerald-200">${c.dirs.size} buyers</span>
    </div>
    <div class="text-xs text-slate-500 mt-1">${fmtGbp(c.value)} · ${esc(c.first)} → ${esc(c.last)}</div></a>`;
}

function dealingsTable(rows) {
  const body = rows.map(r => {
    const type = (r.type || "").toUpperCase();
    const tkey = type || "OTHER";
    const tcls = type === "BUY" ? "bg-emerald-100 text-emerald-700" : (type === "SELL" || type === "SELL_TAX") ? "bg-rose-100 text-rose-700" : "bg-slate-100 text-slate-500";
    const url = r.url || "";
    const src = url ? `<a href="${esc(url)}" target="_blank" rel="noopener" class="text-slate-400 hover:text-indigo-600" title="RNS announcement">↗</a>` : `<span class="text-slate-200">↗</span>`;
    return `<tr data-type="${esc(tkey)}" class="border-b border-slate-100 hover:bg-slate-50">
      <td class="px-3 py-2 text-slate-600">${esc(day(r.date))}</td>
      <td class="px-3 py-2"><a class="text-indigo-600 hover:underline font-medium" href="${companyUrl(r.ticker)}">${esc(r.ticker)}</a></td>
      <td class="px-3 py-2 text-slate-700 max-w-[180px] truncate">${esc(r.company || "")}</td>
      <td class="px-3 py-2 text-slate-700">${esc(r.director || "-")}</td>
      <td class="px-3 py-2">${roleChip(r.role, r.role_normalized)}</td>
      <td class="px-3 py-2"><span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${tcls}">${esc(type || "-")}</span></td>
      <td class="px-3 py-2 text-right tabular-nums">${fmtGbp(r.value)}</td>
      <td class="px-3 py-2">${sigBadges(r.signals)}</td>
      <td class="px-3 py-2 text-center">${src}</td>
    </tr>`;
  }).join("");
  const types = [...new Set(rows.map(r => ((r.type || "").toUpperCase()) || "OTHER"))];
  const TYPE_CLS = { BUY: "bg-emerald-600 border-emerald-600", SELL: "bg-rose-600 border-rose-600", SELL_TAX: "bg-rose-600 border-rose-600" };
  const orderT = ["BUY", "SELL", "SELL_TAX"];
  const sortedTypes = [...orderT.filter(t => types.includes(t)), ...types.filter(t => !orderT.includes(t)).sort()];
  const chips = sortedTypes.map(t => `<button type="button" data-tf="${esc(t)}" aria-pressed="true" class="tf-btn px-2 py-0.5 rounded text-[11px] font-semibold text-white border ${TYPE_CLS[t] || "bg-slate-600 border-slate-600"}">${esc(t)}</button>`).join("");
  return `
    <section class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
      <div class="flex items-center justify-between gap-2 flex-wrap px-4 py-3 border-b border-slate-200">
        <h2 class="text-xs uppercase tracking-wide text-slate-500">This week's dealings</h2>
        <div class="flex flex-wrap gap-1.5" title="Click a type to show/hide">${chips}</div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[820px]">
          <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
            <th class="px-3 py-2 font-medium">Date</th><th class="px-3 py-2 font-medium">Ticker</th><th class="px-3 py-2 font-medium">Company</th>
            <th class="px-3 py-2 font-medium">Director</th><th class="px-3 py-2 font-medium">Role</th><th class="px-3 py-2 font-medium">Type</th>
            <th class="px-3 py-2 font-medium text-right">Value</th><th class="px-3 py-2 font-medium">Signals</th><th class="px-3 py-2 font-medium text-center">RNS</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </section>`;
}

function wireTypeFilters() {
  document.querySelectorAll(".tf-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.tf;
      const next = btn.getAttribute("aria-pressed") !== "true";
      btn.setAttribute("aria-pressed", String(next));
      const sel = (window.CSS && CSS.escape) ? CSS.escape(t) : t;
      document.querySelectorAll('tr[data-type="' + sel + '"]').forEach(r => { r.style.display = next ? "" : "none"; });
    });
  });
}

function render(rows) {
  if (!rows || !rows.length) { app.innerHTML = `<div class="py-20 text-center text-slate-400 text-sm">No dealings found.</div>`; return; }
  const maxDate = rows.map(r => day(r.date)).filter(Boolean).sort().slice(-1)[0];
  const win7 = addDays(maxDate, -7);
  const win30 = addDays(maxDate, -30);
  const week = rows.filter(r => day(r.date) >= win7);
  const clusters = clustersFrom(rows, win30);

  const tiles = `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-5">
    ${tile("Dealings this week", fmtInt(week.length), "to " + esc(maxDate))}
    ${tile("Active clusters", fmtInt(clusters.length), "≥2 buyers · 30 days")}
    ${tile("Companies", fmtInt(new Set(week.map(r => r.ticker)).size), "this week")}
  </div>`;

  const clusterHtml = clusters.length
    ? `<section class="mt-4"><h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Active clusters</h2>
       <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${clusters.slice(0, 12).map(clusterCard).join("")}</div></section>`
    : "";

  app.innerHTML = tiles + clusterHtml + dealingsTable(week);
  wireTypeFilters();
}

(async function () {
  try { render(await fetchAll()); }
  catch (e) { app.innerHTML = `<div class="py-20 text-center text-rose-600 text-sm">Couldn't load data (${esc(e.message)}).</div>`; }
})();
</script>
</body>
</html>
