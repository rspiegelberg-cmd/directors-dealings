<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Company — Directors Dealings</title>
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  html, body { background:#f8fafc; color:#0f172a; }
  .mk-btn[aria-pressed="false"] { opacity:.45; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

<header class="border-b border-slate-200 bg-white px-4 sm:px-6 h-12 flex items-center gap-3">
  <a href="./index.html" class="text-xs text-slate-500 hover:text-slate-900">&larr; All directors dealings</a>
</header>

<main class="max-w-5xl mx-auto px-4 sm:px-6 pb-20">
  <div id="app"><div class="py-20 text-center text-slate-400 text-sm">Loading company…</div></div>
  <footer class="mt-10 pt-4 border-t border-slate-200 text-[11px] text-slate-400">
    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 align-middle mr-1"></span>
    Live from the Directors Dealings database. Director-dealing data sourced from UK RNS PDMR announcements.
  </footer>
</main>

<script>
// Public, read-only credentials (RLS restricts the anon key to the serving views).
const SUPABASE_URL = "https://mmiaiauybzsdcbrrcxfc.supabase.co";
const SUPABASE_KEY = "sb_publishable_vADFSIyRre-9sGyhDnXBcA_H167SU8B";

const app = document.getElementById("app");
const params = new URLSearchParams(location.search);
const ticker = (params.get("ticker") || "").trim().toUpperCase();
const todayISO = new Date().toISOString().slice(0, 10);

const fmtInt = n => (n == null ? "" : Number(n).toLocaleString("en-GB"));
const fmtGbp = n => (n == null || n === "" ? "" : "£" + Number(n).toLocaleString("en-GB", { maximumFractionDigits: 0 }));
const esc = s => (s == null ? "" : String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c])));
const day = s => (s ? String(s).slice(0, 10) : "");

async function fetchView(view, qs) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${view}?${qs}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
  });
  if (!res.ok) throw new Error(view + " HTTP " + res.status);
  return res.json();
}

// Largest index whose label (ascending ISO dates) is <= d. -1 if d precedes the window.
function idxForDate(labels, d) {
  for (let i = labels.length - 1; i >= 0; i--) if (labels[i] <= d) return i;
  return -1;
}

function nextReportingBadge(reporting) {
  const future = (reporting || [])
    .filter(r => r.report_date && day(r.report_date) >= todayISO)
    .sort((a, b) => day(a.report_date) < day(b.report_date) ? -1 : 1);
  if (!future.length) return "";
  const r = future[0];
  const est = /est/i.test(r.source || "") || /est|low/i.test(r.confidence || "");
  return `<span class="px-2.5 py-1 rounded-full text-xs bg-amber-50 border border-amber-200 text-amber-700">`
       + `Next results <b class="font-semibold">${esc(day(r.report_date))}</b>${est ? " (est)" : ""}</span>`;
}

function renderHeader(company, r0, count, reporting) {
  const cap = r0.market_cap_gbp ? "£" + Math.round(r0.market_cap_gbp / 1e6).toLocaleString("en-GB") + "m" : null;
  const chip = (inner, cls = "") => `<span class="px-2.5 py-1 rounded-full text-xs bg-white border border-slate-200 text-slate-600 ${cls}">${inner}</span>`;
  const chips = [];
  if (r0.sector) chips.push(chip(`Sector <b class="font-semibold text-slate-900">${esc(r0.sector)}</b>`));
  if (cap) chips.push(chip(`Mkt cap <b class="font-semibold text-slate-900">${cap}</b>`));
  if (r0.is_aim == 1) chips.push(chip(`AIM`, "!bg-amber-50 !border-amber-200 !text-amber-700"));
  chips.push(chip(`Dealings <b class="font-semibold text-slate-900">${count}</b>`));
  const rb = nextReportingBadge(reporting);
  if (rb) chips.push(rb);
  if (r0.website_url) chips.push(chip(`<a class="text-blue-600 hover:underline" href="${esc(r0.website_url)}" target="_blank" rel="noopener">Website ↗</a>`));
  return `
    <div class="pt-6 pb-2">
      <h1 class="text-2xl font-semibold tracking-tight">${esc(company)}
        <span class="text-slate-400 font-semibold text-xl">${esc(ticker)}</span></h1>
      <div class="flex flex-wrap gap-2 mt-3">${chips.join("")}</div>
    </div>`;
}

function chartSection(hasPrices) {
  if (!hasPrices) return `
    <section class="mt-4 bg-white border border-slate-200 rounded-lg p-4">
      <h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Price</h2>
      <p class="text-sm text-slate-400">No price history available for this ticker yet.</p>
    </section>`;
  return `
    <section class="mt-4 bg-white border border-slate-200 rounded-lg p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs uppercase tracking-wide text-slate-500">Price &amp; volume (trailing window)</h2>
        <div class="flex gap-1.5 text-xs">
          <button data-mk="buy"      aria-pressed="true" class="mk-btn px-2 py-0.5 rounded border border-emerald-200 bg-emerald-50 text-emerald-700">● Buys</button>
          <button data-mk="sell"     aria-pressed="true" class="mk-btn px-2 py-0.5 rounded border border-rose-200 bg-rose-50 text-rose-700">● Sells</button>
          <button data-mk="earnings" aria-pressed="true" class="mk-btn px-2 py-0.5 rounded border border-amber-200 bg-amber-50 text-amber-700">▲ Earnings</button>
        </div>
      </div>
      <div class="relative" style="height:280px"><canvas id="priceChart"></canvas></div>
      <div class="relative mt-1" style="height:64px"><canvas id="volumeChart"></canvas></div>
    </section>`;
}

function dealingsTable(rows) {
  const body = rows.map(r => {
    const sigs = (r.signals || []).map(s => `<span class="inline-block mb-0.5 mr-1 px-1.5 py-0.5 rounded text-[11px] font-semibold bg-blue-50 text-blue-700 border border-blue-200">${esc(s)}</span>`).join("");
    const tcls = r.type === "BUY" ? "text-emerald-700 bg-emerald-50"
      : (r.type === "SELL" || r.type === "SELL_TAX") ? "text-rose-700 bg-rose-50"
      : "text-slate-600 bg-slate-100";
    return `<tr class="border-b border-slate-100 hover:bg-slate-50">
      <td class="px-3 py-2">${esc(day(r.date))}</td>
      <td class="px-3 py-2">${esc(r.director)}</td>
      <td class="px-3 py-2 text-slate-500">${esc(r.role_normalized || r.role || "")}</td>
      <td class="px-3 py-2"><span class="px-1.5 py-0.5 rounded text-[11px] font-bold ${tcls}">${esc(r.type)}</span></td>
      <td class="px-3 py-2 text-right tabular-nums">${fmtInt(r.shares)}</td>
      <td class="px-3 py-2 text-right tabular-nums">${fmtGbp(r.value)}</td>
      <td class="px-3 py-2 text-slate-500">${esc(day(r.announced_at))}</td>
      <td class="px-3 py-2">${sigs}</td>
    </tr>`;
  }).join("");
  return `
    <section class="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
      <h2 class="text-xs uppercase tracking-wide text-slate-500 px-4 py-3 border-b border-slate-200">Director dealings</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[760px]">
          <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
            <th class="px-3 py-2 font-medium">Date</th><th class="px-3 py-2 font-medium">Director</th>
            <th class="px-3 py-2 font-medium">Role</th><th class="px-3 py-2 font-medium">Type</th>
            <th class="px-3 py-2 font-medium text-right">Shares</th><th class="px-3 py-2 font-medium text-right">Value</th>
            <th class="px-3 py-2 font-medium">Announced</th><th class="px-3 py-2 font-medium">Signals</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </section>`;
}

let priceChart, volumeChart;

function buildCharts(prices, dealings, reporting) {
  const asc = prices.slice().sort((a, b) => day(a.date) < day(b.date) ? -1 : 1);
  const labels = asc.map(p => day(p.date));
  const closes = asc.map(p => p.close);
  const vols = asc.map(p => p.volume);
  const minClose = Math.min.apply(null, closes.filter(v => v != null));

  const buy = new Array(labels.length).fill(null);
  const sell = new Array(labels.length).fill(null);
  for (const d of dealings) {
    const i = idxForDate(labels, day(d.date));
    if (i < 0) continue;
    if (d.type === "BUY") buy[i] = closes[i];
    else if (d.type === "SELL" || d.type === "SELL_TAX") sell[i] = closes[i];
  }
  const earn = new Array(labels.length).fill(null);
  for (const r of (reporting || [])) {
    const rd = day(r.report_date);
    if (rd < labels[0] || rd > labels[labels.length - 1]) continue;
    const i = idxForDate(labels, rd);
    if (i >= 0) earn[i] = minClose;
  }

  const mkSet = (label, data, color, style, radius) => ({
    label, data, showLine: false, pointStyle: style, pointRadius: radius,
    pointBackgroundColor: color, pointBorderColor: color, borderColor: color, spanGaps: false
  });

  priceChart = new Chart(document.getElementById("priceChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Close", data: closes, borderColor: "#2563eb", backgroundColor: "rgba(37,99,235,.08)",
          borderWidth: 1.5, pointRadius: 0, tension: .15, fill: true },
        mkSet("Buys", buy, "#059669", "circle", 5),
        mkSet("Sells", sell, "#e11d48", "circle", 5),
        mkSet("Earnings", earn, "#d97706", "triangle", 6)
      ]
    },
    options: {
      maintainAspectRatio: false, animation: false,
      interaction: { mode: "nearest", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { title: items => items.length ? labels[items[0].dataIndex] : "" } }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 10 }, color: "#94a3b8" }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: "#94a3b8" }, grid: { color: "#f1f5f9" } }
      }
    }
  });

  volumeChart = new Chart(document.getElementById("volumeChart"), {
    type: "bar",
    data: { labels, datasets: [{ label: "Volume", data: vols, backgroundColor: "#cbd5e1", barPercentage: 1, categoryPercentage: 1 }] },
    options: {
      maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } }
    }
  });

  // Marker toggles (datasets 1=Buys, 2=Sells, 3=Earnings).
  const map = { buy: 1, sell: 2, earnings: 3 };
  document.querySelectorAll(".mk-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const di = map[btn.dataset.mk];
      const vis = priceChart.isDatasetVisible(di);
      priceChart.setDatasetVisibility(di, !vis);
      btn.setAttribute("aria-pressed", String(!vis));
      priceChart.update();
    });
  });
}

function render(dealings, prices, reporting) {
  if (!dealings || !dealings.length) {
    app.innerHTML = `<div class="py-20 text-center text-rose-600 text-sm">No dealings found for <b>${esc(ticker)}</b>.</div>`;
    return;
  }
  const company = dealings.map(r => r.company).filter(Boolean).sort((a, b) => b.length - a.length)[0] || ticker;
  const r0 = dealings[0];
  app.innerHTML = renderHeader(company, r0, dealings.length, reporting)
    + chartSection(prices && prices.length)
    + dealingsTable(dealings);
  if (prices && prices.length) buildCharts(prices, dealings, reporting);
}

async function load() {
  if (!ticker) {
    app.innerHTML = `<div class="py-20 text-center text-rose-600 text-sm">No ticker specified. Use <code>?ticker=BARC</code>.</div>`;
    return;
  }
  document.title = ticker + " — Directors Dealings";
  const tq = `ticker=eq.${encodeURIComponent(ticker)}`;
  try {
    const [dealings, prices, reporting] = await Promise.all([
      fetchView("public_company_v", `${tq}&order=date.desc,announced_at.desc&limit=500`),
      fetchView("public_prices_v", `${tq}&order=date.desc&limit=420`),
      fetchView("public_reporting_v", `${tq}&order=report_date.asc&limit=60`)
    ]);
    render(dealings, prices, reporting);
  } catch (e) {
    app.innerHTML = `<div class="py-20 text-center text-rose-600 text-sm">Couldn't load data (${esc(e.message)}).</div>`;
  }
}
load();
</script>
</body>
</html>
