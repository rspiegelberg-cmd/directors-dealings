name: Rebuild pages — Directors Dealings

# Fast republish. Regenerates the dashboard pages from the data ALREADY in
# Supabase and publishes the live front page — WITHOUT the slow scrape /
# signal-engine / backtest steps. Use it to get the site current in ~5 minutes
# when the data is already loaded (e.g. after the daily refresh has run), or
# to redeploy the front page after a template change.
#
# Run it from the Actions tab → this workflow → "Run workflow".

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dashboard-pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas "psycopg[binary]"

      - name: Rebuild + publish pages from existing data
        env:
          DD_DATABASE_URL: ${{ secrets.DD_DATABASE_URL }}
          DD_FMP_API_KEY: ${{ secrets.DD_FMP_API_KEY }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python .scripts/backtest.py
          python .scripts/export_dashboard_json.py
          python .scripts/build_dashboard.py

      - name: Commit & push rebuilt dashboard
        run: |
          git config user.name  "directors-dealings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add outputs dashboard/data 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Rebuild pages $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin main || true
            git push
            echo "Pushed rebuilt dashboard — Vercel will redeploy."
          fi
