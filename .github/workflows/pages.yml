name: Deploy dashboard to GitHub Pages

# Publishes the built dashboard in outputs/ to GitHub Pages.
# Runs automatically whenever you push changes to outputs/ on main,
# and can also be triggered by hand from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "outputs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede older ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload built dashboard (outputs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./outputs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
